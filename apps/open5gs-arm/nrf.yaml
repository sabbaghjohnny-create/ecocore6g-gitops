apiVersion: apps/v1
kind: Deployment
metadata:
  name: open5gs-nrf
  namespace: open5gs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open5gs-nrf
  template:
    metadata:
      labels:
        app: open5gs-nrf
    spec:
      nodeSelector:
        leistung: hoch
      containers:
        - name: nrf
          image: ghcr.io/borjis131/nrf:v2.7.5
          ports:
            - containerPort: 7777
---
apiVersion: v1
kind: Service
metadata:
  name: open5gs-nrf
  namespace: open5gs
spec:
  selector:
    app: open5gs-nrf
  ports:
    - port: 7777
