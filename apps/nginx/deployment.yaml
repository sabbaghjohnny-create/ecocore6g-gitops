apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: nginx-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
    spec:
      nodeSelector:
        leistung: niedrig
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
